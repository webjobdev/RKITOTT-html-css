<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
/>
<style>
  .hub-hero {
    background:var(--dark) url('https://ottappscreation.com/wp-content/uploads/2025/10/f2-bg.webp') no-repeat center center;
    background-size:cover;
    position: relative;
    /* background: #0b0e1a; */
    padding: 100px 20px 30px;
    overflow: hidden;
    text-align: center;
    font-family: 'Roboto', sans-serif;
  }

  .hub-hero::before {
    content: "";
    position: absolute;
    width: 700px;
    height: 700px;
    left: 50%;
    top: -100px;
    transform: translateX(-50%);
    background: radial-gradient(circle, rgba(245,90,0,0.16) 0%, transparent 65%);
    filter: blur(10px);
    pointer-events: none;
  }

  .hub-particle {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(245,90,0,0.55);
    box-shadow: 0 0 8px 2px rgba(245,90,0,0.4);
    pointer-events: none;
    animation: hub-drift linear infinite;
  }
  @keyframes hub-drift {
    from { transform: translateY(0) translateX(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    to   { transform: translateY(-200px) translateX(var(--drift-x, 20px)); opacity: 0; }
  }

  .hub-badge {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 100px;
    padding: 5px 6px 5px 12px;
    font-size: 13px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 24px;
    opacity: 0;
    filter: blur(6px);
    animation: hub-fade-down 0.7s ease 0.1s forwards;
  }
  .hub-avatars { display: flex; }
  .hub-avatars span {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid #0b0e1a; margin-left: -7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: #fff;
  }
  .hub-avatars span:first-child { margin-left: 0; }
  .hub-avatars span:nth-child(1) { background: #f55a00; }
  .hub-avatars span:nth-child(2) { background: #1a7f3c; }
  .hub-avatars span:nth-child(3) { background: #1428a0; }
  .hub-badge-cta {
    background: #f55a00; color: #fff; font-size: 12px; font-weight: 600;
    padding: 5px 12px; border-radius: 100px;
  }

  .hub-title {
    position: relative;
    font-size: 42px;
    font-weight: 900;
    color: #fff5f5;
    line-height: 1.18;
    max-width: 640px;
    margin: 0 auto 14px;
  }
  .hub-title .word {
    display: inline-block;
    opacity: 0;
    filter: blur(8px);
    transform: translateY(14px);
    animation: hub-word-in 0.55s ease forwards;
  }
  .hub-title span.accent { color: #f55a00; }

  .hub-sub {
    position: relative;
    font-size: 16px;
    color: rgba(255,255,255,0.55);
    max-width: 440px;
    margin: 0 auto 24px;
    line-height: 1.6;
    opacity: 0;
    animation: hub-fade-up 0.7s ease 1s forwards;
  }

  .hub-ctas {
    position: relative;
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 50px;
    opacity: 0;
    animation: hub-fade-up 0.7s ease 1.15s forwards;
  }
  .hub-btn-primary, .hub-btn-ghost {
    font-size: 13px; font-weight: 600; padding: 10px 18px; border-radius: 8px;
    display: inline-flex; align-items: center; gap: 6px; border: none; cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
  }
  .hub-btn-primary { background: #f55a00; color: #fff; }
  .hub-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 22px rgba(245,90,0,0.4); }
  .hub-btn-ghost { background: rgba(255,255,255,0.06); color: #fff; border: 1px solid rgba(255,255,255,0.15); }
  .hub-btn-ghost:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
  .hub-btn-primary i, .hub-btn-ghost i { font-size: 14px; }

  /* ===== hub + connector diagram ===== */
  .hub-diagram-outer { perspective: 1200px; }
  .hub-diagram {
    position: relative;
    max-width: 680px;
    margin: 0 auto;
    height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.2s ease-out;
  }

  .hub-ring {
    position: absolute;
    left: 50%; top: 50%;
    width: 118px; height: 118px;
    margin-left: -59px; margin-top: -59px;
    border-radius: 50%;
    border: 1px dashed rgba(245,90,0,0.35);
    animation: hub-spin 14s linear infinite;
    z-index: 4;
  }
  .hub-ring::before, .hub-ring::after {
    content: "";
    position: absolute;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #ff9d4d;
    box-shadow: 0 0 8px 2px rgba(245,90,0,0.7);
  }
  .hub-ring::before { top: -2.5px; left: 50%; margin-left: -2.5px; }
  .hub-ring::after { bottom: -2.5px; left: 50%; margin-left: -2.5px; }
  @keyframes hub-spin { to { transform: rotate(360deg); } }

  .hub-core {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 58px; height: 58px;
    border-radius: 16px;
    background: linear-gradient(145deg, #ff7a1a, #e04e00);
    display: flex; align-items: center; justify-content: center;
    box-shadow:
      0 0 0 8px rgba(245,90,0,0.08),
      0 0 0 15px rgba(245,90,0,0.05),
      0 18px 36px rgba(245,90,0,0.35);
    animation: hub-pulse 3.2s ease-in-out infinite, hub-pop 0.6s cubic-bezier(.34,1.56,.64,1) 0.9s backwards;
    z-index: 6;
  }
  .hub-core i { font-size: 26px; color: #fff; }

  .hub-node {
    position: absolute;
    display: flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 9px;
    padding: 7px 12px 7px 8px;
    backdrop-filter: blur(4px);
    opacity: 0;
    transform-style: preserve-3d;
    animation: hub-node-in 0.55s cubic-bezier(.34,1.56,.64,1) forwards, hub-node-float 4.5s ease-in-out infinite;
    transition: border-color 0.25s ease, background 0.25s ease, transform 0.25s ease;
  }
  .hub-node:hover {
    border-color: rgba(245,90,0,0.6);
    background: rgba(255,255,255,0.09);
    transform: translateZ(16px) scale(1.05) !important;
  }
  .hub-node .hub-node-icon {
    width: 22px; height: 22px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    color: #f55a00;
  }
  .hub-node .hub-node-icon i { font-size: 16px; color: #f55a00;}
  .hub-node span { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.85); white-space: nowrap; }

  .hub-node.n1 { top: 2%;   left: 2%;   animation-delay: 1.05s, 1.6s; }
  .hub-node.n2 { top: 2%;   right: 2%;  animation-delay: 1.15s, 1.9s; }
  .hub-node.n3 { top: 44%;  left: -2%;  animation-delay: 1.25s, 2.2s; }
  .hub-node.n4 { top: 44%;  right: -2%; animation-delay: 1.35s, 2.5s; }
  .hub-node.n5 { bottom: 2%; left: 6%;  animation-delay: 1.45s, 2.8s; }
  .hub-node.n6 { bottom: 2%; right: 6%; animation-delay: 1.55s, 3.1s; }

  .hub-lines { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; overflow: visible; }
  .hub-lines path.base {
    fill: none;
    stroke: rgba(245,90,0,0.35);
    stroke-width: 1.4;
    stroke-dasharray: 5 6;
    stroke-linecap: round;
    stroke-dashoffset: 320;
    animation: hub-draw 1.3s ease forwards;
  }
  .hub-lines path:nth-child(1){ animation-delay: 0.7s; }
  .hub-lines path:nth-child(2){ animation-delay: 0.8s; }
  .hub-lines path:nth-child(3){ animation-delay: 0.9s; }
  .hub-lines path:nth-child(4){ animation-delay: 1.0s; }
  .hub-lines path:nth-child(5){ animation-delay: 1.1s; }
  .hub-lines path:nth-child(6){ animation-delay: 1.2s; }

  .hub-pulse-dot {
    r: 2.6;
    fill: #ffb066;
    filter: drop-shadow(0 0 4px rgba(255,157,77,0.9));
    opacity: 0;
    animation: hub-fade-in-simple 0.3s ease forwards;
  }

  @keyframes hub-fade-in-simple { to { opacity: 1; } }
  @keyframes hub-draw { to { stroke-dashoffset: 0; } }
  @keyframes hub-node-in {
    from { opacity: 0; transform: translateY(16px) scale(0.7) rotate(-6deg); }
    to   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
  }
  @keyframes hub-node-float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-5px); }
  }
  @keyframes hub-pulse {
    0%, 100% { box-shadow: 0 0 0 8px rgba(245,90,0,0.08), 0 0 0 15px rgba(245,90,0,0.05), 0 18px 36px rgba(245,90,0,0.35); }
    50%      { box-shadow: 0 0 0 12px rgba(245,90,0,0.14), 0 0 0 22px rgba(245,90,0,0.07), 0 18px 48px rgba(245,90,0,0.5); }
  }
  @keyframes hub-pop {
    from { transform: translate(-50%, -50%) scale(0.3) rotate(-25deg); opacity: 0; }
    to   { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes hub-fade-up {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes hub-fade-down {
    from { opacity: 0; transform: translateY(-8px); filter: blur(6px); }
    to   { opacity: 1; transform: translateY(0); filter: blur(0); }
  }
  @keyframes hub-word-in {
    to { opacity: 1; filter: blur(0); transform: translateY(0); }
  }

  @media (max-width: 900px) {
    .hub-diagram { height: auto; padding-bottom: 30px; transform: none !important; }
    .hub-lines, .hub-ring { display: none; }
    .hub-node { position: relative !important; inset: auto !important; display: inline-flex; margin: 5px; animation: hub-node-in 0.55s ease forwards; }
    .hub-node.n1,.hub-node.n2,.hub-node.n3,.hub-node.n4,.hub-node.n5,.hub-node.n6 { top:auto; left:auto; right:auto; bottom:auto; }
    .hub-core { position: relative; left: auto; top: auto; transform: none; margin: 0 auto 18px; }
  }
  @media (max-width: 600px) {
    .hub-hero { padding: 50px 20px 40px; }
    .hub-title { font-size: 28px; }
    .hub-sub { font-size: 14px; }
    .hub-ctas { margin-bottom: 30px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .hub-badge, .hub-title .word, .hub-sub, .hub-ctas, .hub-node, .hub-core, .hub-ring, .hub-lines path, .hub-particle {
      animation: none !important;
      opacity: 1 !important;
      filter: none !important;
      stroke-dashoffset: 0 !important;
      transform: none !important;
    }
  }
</style>

<section class="hub-hero" id="hubHero">
  <div class="hub-badge">
    <!-- <div class="hub-avatars"><span>A</span><span>R</span><span>S</span></div> -->
    <span>50+ OTT Platforms Launched Globally</span>
    <span class="hub-badge-cta" onclick="window.location.href='/contact-us/'" >Get a proposal</span>
  </div>

  <h1 class="hub-title">
    <span class="word" style="animation-delay:.15s">Launch Your Own OTT PlatformBuilt for Every Screen</span>
  </h1>

  <p class="hub-sub">
   End-to-end streaming platform development with native apps for iOS, Android, Smart TVs, Roku, Fire TV, and beyond. Launch in weeks, not years.
  </p>

  <div class="hub-ctas">
    <button class="hub-btn-primary" onclick="window.location.href='/contact-us/'"  >Get a Free Demo <i class="ti ti-arrow-right"></i></button>
    <button class="hub-btn-ghost" onclick="window.location.href='/our-services/'" >Explore Services <i class="ti ti-chevron-right"></i></button>
  </div>

  <div class="hub-diagram-outer">
    <div class="hub-diagram" id="hubDiagram">
      <svg class="hub-lines" viewBox="0 0 680 300" preserveAspectRatio="none" id="hubSvg">
        <path class="base" id="p1" d="M 340 150 C 285 150, 235 95, 95 42"></path>
        <path class="base" id="p2" d="M 340 150 C 395 150, 445 95, 585 42"></path>
        <path class="base" id="p3" d="M 340 150 C 285 150, 220 150, 40 143"></path>
        <path class="base" id="p4" d="M 340 150 C 395 150, 460 150, 640 143"></path>
        <path class="base" id="p5" d="M 340 150 C 300 185, 255 245, 120 265"></path>
        <path class="base" id="p6" d="M 340 150 C 380 185, 425 245, 560 265"></path>
      </svg>

      <div class="hub-ring"></div>
      <div class="hub-core"><i class="ti ti-device-tv-old"></i></div>

      <div class="hub-node n1"><div class="hub-node-icon"><i class="ti ti-brand-apple"></i></div><span>iOS</span></div>
      <div class="hub-node n2"><div class="hub-node-icon"><i class="ti ti-brand-amazon" ></i></div><span>Fire TV</span></div>
      <div class="hub-node n3"><div class="hub-node-icon"><i class="ti ti-device-mobile" ></i></div><span>Android</span></div>
      <div class="hub-node n4"><div class="hub-node-icon"><i class="ti ti-device-tv" ></i></div><span>Roku</span></div>
      <div class="hub-node n5"><div class="hub-node-icon"><i class="ti ti-device-tv"></i></div><span>Samsung TV</span></div>
      <div class="hub-node n6"><div class="hub-node-icon"><i class="ti ti-world"></i></div><span>Web</span></div>
    </div>
  </div>
</section>

<script>
(function() {
  var hero = document.getElementById('hubHero');
  var diagram = document.getElementById('hubDiagram');
  var svg = document.getElementById('hubSvg');

  for (var i = 0; i < 10; i++) {
    var p = document.createElement('div');
    p.className = 'hub-particle';
    p.style.left = (Math.random() * 100) + '%';
    p.style.bottom = (Math.random() * 50) + 'px';
    p.style.setProperty('--drift-x', (Math.random() * 60 - 30) + 'px');
    p.style.animationDuration = (6 + Math.random() * 6) + 's';
    p.style.animationDelay = (Math.random() * 6) + 's';
    hero.appendChild(p);
  }

  var outer = document.querySelector('.hub-diagram-outer');
  outer.addEventListener('mousemove', function(e) {
    var rect = outer.getBoundingClientRect();
    var x = (e.clientX - rect.left) / rect.width - 0.5;
    var y = (e.clientY - rect.top) / rect.height - 0.5;
    diagram.style.transform = 'rotateY(' + (x * 7) + 'deg) rotateX(' + (-y * 7) + 'deg)';
  });
  outer.addEventListener('mouseleave', function() {
    diagram.style.transform = 'rotateY(0deg) rotateX(0deg)';
  });

  var paths = svg.querySelectorAll('path.base');
  paths.forEach(function(path, idx) {
    var dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('class', 'hub-pulse-dot');
    svg.appendChild(dot);
    var len = path.getTotalLength();
    var duration = 2200 + idx * 150;
    var startDelay = 2000 + idx * 220;

    function animateDot(ts, startTs) {
      if (!startTs) startTs = ts;
      var elapsed = (ts - startTs) % duration;
      var t = elapsed / duration;
      var pt = path.getPointAtLength(t * len);
      dot.setAttribute('cx', pt.x);
      dot.setAttribute('cy', pt.y);
      dot.style.opacity = (t < 0.05 || t > 0.95) ? 0 : 1;
      requestAnimationFrame(function(next) { animateDot(next, startTs); });
    }
    setTimeout(function() {
      requestAnimationFrame(function(ts) { animateDot(ts); });
    }, startDelay);
  });
})();
</script>
